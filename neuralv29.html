<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Core v29.0 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; }
        
        * { font-family: 'Ubuntu', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        body {
            background: #010a0a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .hero-text {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -1.2px;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .bar-track {
            background: rgba(255,255,255,0.1);
            height: 5px;
            border-radius: 9999px;
            overflow: hidden;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-[#010a0a] min-h-screen flex items-center justify-center p-2" id="loginScreen">
        <div class="glass-card w-full max-w-[340px] rounded-3xl border border-[#d4af37]/30 overflow-hidden">
            <!-- Login Card -->
            <div class="p-1 pb-1">
                <div class="flex justify-center mb-2">
                    <div class="w-14 h-14 bg-[#d4af37] rounded-2xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-fingerprint text-3xl text-black"></i>
                    </div>
                </div>
                
                <h2 class="text-2xl font-bold text-center text-white mb-1">Neural Access</h2>
                <p class="text-center text-gray-400 text-sm mb-7">v29.0 Pro Edition</p>

                <!-- Info Box -->
                <div class="bg-black/70 rounded-2xl p-2 mb-2 border border-white/10">
                    <div class="flex items-center gap-2 mb-1">
                        <i class="fa-solid fa-user-secret text-[#d4af37] text-lg"></i>
                        <div class="flex-1">
                            <span class="text-xs text-gray-400">Dev:</span>
                            <span class="text-cyan-400 font-medium ml-2">Vip Predict King</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-whatsapp text-[#d4af37] text-lg"></i>
                        <div class="flex-1">
                            <span class="text-xs text-gray-400">WA:</span>
                            <span class="font-medium ml-2">+91 6290530153</span>
                        </div>
                    </div>
                </div>

                <!-- Inputs -->
                <div class="space-y-4">
                    <input type="text" id="uid" placeholder="User ID" 
                           class="w-full bg-white/5 border border-white/20 rounded-2xl px-5 py-3.5 text-base focus:border-[#d4af37] outline-none">
                    
                    <input type="password" id="upass" placeholder="Password" 
                           class="w-full bg-white/5 border border-white/20 rounded-2xl px-5 py-3.5 text-base focus:border-[#d4af37] outline-none">
                    
                    <button onclick="handleLogin()" 
                            class="w-full bg-[#d4af37] text-black font-bold py-4 rounded-2xl text-base uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i class="fa-solid fa-right-to-bracket"></i> SIGN IN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden flex flex-col h-screen max-w-md mx-auto bg-[#010a0a]">

        <!-- Header -->
        <div class="glass-card p-1 flex items-center">
            <div class="flex items-center gap-1">
                <i class="fa-solid fa-microchip text-xl text-[#d4af37]"></i>
                <h1 class="text-lg font-bold">Neural <span class="text-[#d4af37]">v29.0</span></h1>
            </div>
            <div class="flex-1 text-center">
                <p id="userNameDisplay" class="text-xs text-cyan-400 font-medium">Active User</p>
            </div>
            <button onclick="location.reload()" class="w-4 h-4 bg-rose-500/10 text-rose-400 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>

        <!-- Prediction Section - Compact -->
        <div class="glass-card mx-3 mt-3 p-4 rounded-3xl space-y-4">
            <div class="flex justify-between items-center">
                <!-- Period -->
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <i class="fa-solid fa-hashtag text-[#d4af37]"></i>
                        <span class="text-xs uppercase tracking-widest text-slate-400">Period ID</span>
                    </div>
                    <input type="number" id="periodInput" 
                           oninput="runAI()" 
                           class="w-full bg-transparent text-3xl font-bold mono outline-none"
                           placeholder="0000">
                </div>
                
                <!-- Level -->
                <div class="text-right">
                    <div class="flex items-center justify-end gap-2">
                        <i class="fa-solid fa-layer-group text-[#d4af37]"></i>
                        <span class="text-xs uppercase tracking-widest text-slate-400">Level</span>
                    </div>
                    <p id="lvDisplay" class="text-2xl font-bold text-[#d4af37] mono">1</p>
                </div>
            </div>

            <!-- Result -->
            <div class="bg-black/70 rounded-2xl p-5 relative">
                <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/90 rounded-2xl">
                    <i class="fa-solid fa-dna fa-spin text-4xl text-[#d4af37]"></i>
                </div>

                <div id="resultArea" class="text-center">
                    <div class="flex justify-around">
                        <div>
                            <p class="text-xs text-slate-400">SIZE</p>
                            <h2 id="resSize" class="hero-text">---</h2>
                        </div>
                        <div class="w-px bg-white/10"></div>
                        <div>
                            <p class="text-xs text-slate-400">COLOR</p>
                            <h2 id="resColor" class="hero-text">---</h2>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-2 gap-6">
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-yellow-400">Big</span>
                                <span id="bigPct" class="font-bold">0%</span>
                            </div>
                            <div class="bar-track">
                                <div id="bigBar" class="h-full bg-yellow-400" style="width:0%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-blue-400">Small</span>
                                <span id="smallPct" class="font-bold">0%</span>
                            </div>
                            <div class="bar-track">
                                <div id="smallBar" class="h-full bg-blue-400" style="width:0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="record('Win')" 
                        class="py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-check"></i> SUCCESS
                </button>
                <button onclick="record('Loss')" 
                        class="py-3 bg-rose-600 hover:bg-rose-500 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-rotate-right"></i> REFINE
                </button>
            </div>
        </div>

        <!-- History - Compact -->
        <div class="flex-1 glass-card mx-3 mt-3 mb-3 rounded-3xl flex flex-col overflow-hidden">
            <div class="px-4 py-3 border-b border-white/10 flex justify-between bg-black/40">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-[#d4af37]"></i>
                    <span class="font-medium text-sm">History (<span id="totalCount">0</span>)</span>
                </div>
                <button onclick="clearHistory()" class="text-rose-400 text-xs px-3 py-1 rounded-lg hover:bg-rose-500/10">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-auto no-scrollbar">
                <table class="w-full text-xs">
                    <thead class="sticky top-0 bg-[#010a0a]">
                        <tr class="text-slate-400">
                            <th class="py-2 px-3 text-left">Period</th>
                            <th class="py-2 px-3 text-left">Predict</th>
                            <th class="py-2 px-3 text-center">Actual</th>
                            <th class="py-2 px-3 text-right">Res</th>
                        </tr>
                    </thead>
                    <tbody id="logItems" class="divide-y divide-white/10"></tbody>
                </table>
            </div>
            
            <div class="p-3 bg-black/40 border-t border-white/10 flex justify-center gap-6 text-[#d4af37]">
                <button onclick="prevPage()" class="px-2"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="pageDisplay" class="mono">1 / 1</span>
                <button onclick="nextPage()" class="px-2"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        const users = {
            "admin": { pass: "Admin@1991", name: "Master Admin" },
            "demo1": { pass: "demo11", name: "Susovan" },
            "demo2": { pass: "demo22", name: "Jacob" },
            "demo3": { pass: "demo33", name: "James" }
        };

        let logs = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentLv = 1;
        let activePrediction = null;

        function loadState() {
            const saved = localStorage.getItem('neural_logs');
            if (saved) logs = JSON.parse(saved);
            const level = localStorage.getItem('neural_level');
            if (level) currentLv = parseInt(level) || 1;
        }

        function saveState() {
            localStorage.setItem('neural_logs', JSON.stringify(logs));
            localStorage.setItem('neural_level', currentLv);
        }

        function getColorClass(val) {
            if (val === 'Big') return 'text-yellow-400';
            if (val === 'Small') return 'text-blue-400';
            if (val === 'Green') return 'text-emerald-400';
            if (val === 'Red') return 'text-rose-400';
            if (val === 'Violet') return 'text-purple-400';
            return 'text-white';
        }

        function handleLogin() {
            const uid = document.getElementById('uid').value.trim().toLowerCase();
            const pass = document.getElementById('upass').value;

            if (users[uid] && users[uid].pass === pass) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').textContent = users[uid].name;
                renderTable();
            } else {
                alert("Invalid User ID or Password!");
            }
        }

        function runAI() {
            const period = document.getElementById('periodInput').value.trim();
            if (!period) return;

            document.getElementById('loader').classList.remove('hidden');

            setTimeout(() => {
                const sizes = ["Big", "Small"];
                const colors = ["Green", "Red", "Violet"];
                const size = sizes[Math.floor(Math.random() * 2)];
                const color = colors[Math.floor(Math.random() * 3)];

                const bigProb = size === "Big" ? Math.floor(Math.random() * 28) + 67 : Math.floor(Math.random() * 35) + 32;

                document.getElementById('loader').classList.add('hidden');

                document.getElementById('resSize').textContent = size;
                document.getElementById('resSize').className = `hero-text ${getColorClass(size)}`;

                document.getElementById('resColor').textContent = color;
                document.getElementById('resColor').className = `hero-text ${getColorClass(color)}`;

                document.getElementById('bigPct').textContent = bigProb + '%';
                document.getElementById('bigBar').style.width = bigProb + '%';
                document.getElementById('smallPct').textContent = (100 - bigProb) + '%';
                document.getElementById('smallBar').style.width = (100 - bigProb) + '%';

                activePrediction = { p: period, s: size, c: color };
            }, 480);
        }

        function record(result) {
            if (!activePrediction) return alert("Enter Period ID first!");

            const isWin = result === "Win";
            const actualSize = isWin ? activePrediction.s : (activePrediction.s === "Big" ? "Small" : "Big");
            const actualColor = isWin ? activePrediction.c : (activePrediction.c === "Green" ? "Red" : "Green");

            logs.unshift({
                p: activePrediction.p,
                s: activePrediction.s,
                c: activePrediction.c,
                actS: actualSize,
                actC: actualColor,
                res: result
            });

            currentLv = isWin ? 1 : Math.min(currentLv + 1, 8);
            saveState();
            renderTable();

            document.getElementById('periodInput').value = parseInt(activePrediction.p) + 1;
            activePrediction = null;
            runAI();
        }

        function clearHistory() {
            if (confirm("Clear all history?")) {
                logs = [];
                currentLv = 1;
                localStorage.clear();
                currentPage = 1;
                renderTable();
            }
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const pageLogs = logs.slice(start, start + rowsPerPage);

            let html = '';
            pageLogs.forEach(log => {
                html += `
                    <tr class="border-b border-white/10">
                        <td class="px-3 py-3 mono">${log.p}</td>
                        <td class="px-3 py-3">
                            <span class="${getColorClass(log.s)}">${log.s}</span>
                            <span class="${getColorClass(log.c)} text-xs"> (${log.c[0]})</span>
                        </td>
                        <td class="px-3 py-3 text-center">
                            <span class="${getColorClass(log.actS)}">${log.actS}</span>
                        </td>
                        <td class="px-3 py-3 text-right font-bold ${log.res === 'Win' ? 'text-emerald-400' : 'text-rose-400'}">
                            ${log.res}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('logItems').innerHTML = html || `<tr><td colspan="4" class="text-center py-10 text-slate-500">No records</td></tr>`;

            document.getElementById('totalCount').textContent = logs.length;
            document.getElementById('pageDisplay').textContent = `${currentPage} / ${Math.ceil(logs.length / rowsPerPage) || 1}`;
            document.getElementById('lvDisplay').textContent = currentLv;
        }

        function nextPage() { if (currentPage * rowsPerPage < logs.length) { currentPage++; renderTable(); } }
        function prevPage() { if (currentPage > 1) { currentPage--; renderTable(); } }

        loadState();
    </script>
</body>
</html>
