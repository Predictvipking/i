<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Core v29.0 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; }
        * { font-family: 'Ubuntu', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        body {
            background: #010a0a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .hero-text {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-3 bg-[#010a0a]">
        <div class="glass-card w-full max-w-[340px] rounded-3xl p-4">
            <div class="flex justify-center mb-2">
                <div class="w-14 h-14 bg-[#d4af37] rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-fingerprint text-4xl text-black"></i>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-center mb-1">Neural Access</h2>
            <p class="text-center text-gray-400 text-sm mb-4">v29.0 Pro Edition</p>

            <div class="bg-black/60 rounded-2xl p-2 mb-3">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fa-solid fa-user-secret text-[#d4af37]"></i>
                    <span class="text-xs text-gray-400">Dev:</span>
                    <span class="text-cyan-400">Vip Predict King</span>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-whatsapp text-[#d4af37]"></i>
                    <span class="text-xs text-gray-400">WA:</span>
                    <span>+91 6290530153</span>
                </div>
            </div>

            <input type="text" id="uid" placeholder="User ID" class="w-full bg-white/5 border border-white/20 rounded-2xl px-5 py-3.5 mb-3 text-sm focus:border-[#d4af37] outline-none">
            <input type="password" id="upass" placeholder="Password" class="w-full bg-white/5 border border-white/20 rounded-2xl px-5 py-3.5 mb-5 text-sm focus:border-[#d4af37] outline-none">

            <button onclick="handleLogin()" class="w-full bg-[#d4af37] text-black font-bold py-4 rounded-2xl text-base uppercase flex items-center justify-center gap-2 active:scale-95">
                <i class="fa-solid fa-right-to-bracket"></i> SIGN IN
            </button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden flex flex-col h-screen max-w-md mx-auto bg-[#010a0a]">

        <!-- Header -->
        <div class="glass-card p-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-microchip text-xl text-[#d4af37]"></i>
                <span class="font-bold">Neural v29.0</span>
            </div>
            <div id="userNameDisplay" class="text-cyan-400 text-sm font-medium"></div>
            <button onclick="location.reload()" class="w-8 h-8 bg-rose-500/10 text-rose-400 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>

        <!-- Prediction -->
        <div class="glass-card mx-2 mt-2 p-2 rounded-3xl space-y-4">
            <div class="flex justify-between">
                <div class="flex-1">
                    <span class="text-xs text-slate-400">PERIOD ID</span>
                    <input type="number" id="periodInput" oninput="runAI()" 
                           class="w-full bg-transparent text-4xl font-bold mono outline-none mt-1" placeholder="-----">
                </div>
                <div class="text-right">
                    <span class="text-xs text-slate-400">LEVEL</span>
                    <div id="lvDisplay" class="text-3xl font-bold text-[#d4af37] mono">1</div>
                </div>
            </div>

            <!-- Result Area -->
            <div class="bg-black/80 rounded-2xl p-4 relative">
                <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/90 rounded-2xl z-10">
                    <i class="fa-solid fa-dna fa-spin text-4xl text-[#d4af37]"></i>
                </div>

                <div class="flex justify-between text-center">
                    <div class="flex-1">
                        <p class="text-xs text-slate-400">SIZE</p>
                        <h2 id="resSize" class="hero-text text-yellow-400">---</h2>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs text-slate-400">COLOR</p>
                        <h2 id="resColor" class="hero-text text-purple-400">---</h2>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-6">
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-yellow-400">Big</span>
                            <span id="bigPct" class="font-bold">0%</span>
                        </div>
                        <div class="h-1.5 bg-white/10 rounded-full overflow-hidden">
                            <div id="bigBar" class="h-full bg-yellow-400 transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-blue-400">Small</span>
                            <span id="smallPct" class="font-bold">0%</span>
                        </div>
                        <div class="h-1.5 bg-white/10 rounded-full overflow-hidden">
                            <div id="smallBar" class="h-full bg-blue-400 transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="record('Win')" class="bg-emerald-600 py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-check"></i> SUCCESS
                </button>
                <button onclick="record('Loss')" class="bg-rose-600 py-3.5 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-rotate"></i> REFINE
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="glass-card mx-2 mt-2 p-2 rounded-3xl">
            <div class="grid grid-cols-4 gap-2 text-center">
                <div class="bg-black/50 p-1 rounded-2xl">
                    <i class="fa-solid fa-check text-emerald-400 text-lg"></i>
                    <p class="text-[10px] text-slate-400">Win</p>
                    <p id="winCount" class="text-1xl font-bold text-emerald-400">0</p>
                </div>
                <div class="bg-black/50 p-1 rounded-2xl">
                    <i class="fa-solid fa-rotate text-rose-400 text-lg"></i>
                    <p class="text-[10px] text-slate-400">Loss</p>
                    <p id="lossCount" class="text-1xl font-bold text-rose-400">0</p>
                </div>
                <div class="bg-black/50 p-1 rounded-2xl">
                    <i class="fa-solid fa-chart-line text-yellow-400 text-lg"></i>
                    <p class="text-[10px] text-slate-400">Avg</p>
                    <p id="winRate" class="text-1xl font-bold text-yellow-400">0%</p>
                </div>
                <div class="bg-black/50 p-1 rounded-2xl">
                    <i class="fa-solid fa-list text-[#d4af37] text-lg"></i>
                    <p class="text-[10px] text-slate-400">Revised</p>
                    <p id="totalPlays" class="text-1xl font-bold text-[#d4af37]">0</p>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="flex-1 glass-card mx-2 mt-2 mb-2 rounded-3xl flex flex-col overflow-hidden">
            <div class="px-4 py-3 border-b border-white/10 flex justify-between bg-black/40">
                <span class="font-medium flex items-center gap-2">
                    <i class="fa-solid fa-list-ul"></i> History (<span id="totalCount">0</span>)
                </span>
                <button onclick="clearHistory()" class="text-rose-400 text-xs">Clear</button>
            </div>
            
            <div class="flex-1 overflow-auto no-scrollbar">
                <table class="w-full text-xs">
                    <thead class="sticky top-0 bg-[#010a0a]">
                        <tr class="text-slate-400">
                            <th class="py-3 px-4 text-left">Period</th>
                            <th class="py-3 px-4 text-left">Predict</th>
                            <th class="py-3 px-4 text-center">Actual</th>
                            <th class="py-3 px-4 text-right">Res</th>
                        </tr>
                    </thead>
                    <tbody id="logItems" class="divide-y divide-white/10"></tbody>
                </table>
            </div>
            
            <div class="p-3 flex justify-center gap-6 text-[#d4af37]">
                <button onclick="prevPage()"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="pageDisplay" class="mono">1 / 1</span>
                <button onclick="nextPage()"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        const users = {
            "admin": { pass: "Admin@1991", name: "Master Admin" },
            "demo1": { pass: "demo11", name: "Susovan" },
            "demo2": { pass: "demo22", name: "Jacob" },
            "demo3": { pass: "demo33", name: "James" }
        };

        let logs = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentLv = 1;
        let activePrediction = null;

        function loadState() {
            const saved = localStorage.getItem('neural_logs');
            if (saved) logs = JSON.parse(saved);
            const lv = localStorage.getItem('neural_level');
            if (lv) currentLv = parseInt(lv) || 1;
        }

        function saveState() {
            localStorage.setItem('neural_logs', JSON.stringify(logs));
            localStorage.setItem('neural_level', currentLv);
        }

        function getColorClass(val) {
            if (val === 'Big') return 'text-yellow-400';
            if (val === 'Small') return 'text-blue-400';
            if (val === 'Green') return 'text-emerald-400';
            if (val === 'Red') return 'text-rose-400';
            if (val === 'Violet') return 'text-purple-400';
            return 'text-white';
        }

        function handleLogin() {
            const uid = document.getElementById('uid').value.trim().toLowerCase();
            const pass = document.getElementById('upass').value;

            if (users[uid] && users[uid].pass === pass) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').textContent = users[uid].name;
                renderTable();
                updateStats();
            } else {
                alert("Invalid User ID or Password!");
            }
        }

        function runAI() {
            const period = document.getElementById('periodInput').value.trim();
            if (!period) return;

            document.getElementById('loader').classList.remove('hidden');

            setTimeout(() => {
                const sizes = ["Big", "Small"];
                const colors = ["Green", "Red", "Violet"];
                const size = sizes[Math.floor(Math.random() * 2)];
                const color = colors[Math.floor(Math.random() * 3)];

                const bigProb = size === "Big" ? 
                    Math.floor(Math.random() * 28) + 67 : 
                    Math.floor(Math.random() * 35) + 32;

                document.getElementById('loader').classList.add('hidden');

                // Update Result
                document.getElementById('resSize').textContent = size;
                document.getElementById('resSize').className = `hero-text ${getColorClass(size)}`;

                document.getElementById('resColor').textContent = color;
                document.getElementById('resColor').className = `hero-text ${getColorClass(color)}`;

                // Update Bars
                document.getElementById('bigPct').textContent = bigProb + '%';
                document.getElementById('bigBar').style.width = bigProb + '%';
                document.getElementById('smallPct').textContent = (100 - bigProb) + '%';
                document.getElementById('smallBar').style.width = (100 - bigProb) + '%';

                activePrediction = { p: period, s: size, c: color };
            }, 450);
        }

        function record(status) {
            if (!activePrediction) return alert("Enter Period ID first!");

            const isWin = status === "Win";
            const actS = isWin ? activePrediction.s : (activePrediction.s === "Big" ? "Small" : "Big");
            const actC = isWin ? activePrediction.c : (activePrediction.c === "Green" ? "Red" : "Green");

            logs.unshift({
                p: activePrediction.p,
                s: activePrediction.s,
                c: activePrediction.c,
                actS: actS,
                actC: actC,
                res: status
            });

            currentLv = isWin ? 1 : Math.min(currentLv + 1, 8);
            saveState();
            renderTable();
            updateStats();

            document.getElementById('periodInput').value = parseInt(activePrediction.p) + 1;
            activePrediction = null;
            runAI();
        }

        function updateStats() {
            const total = logs.length;
            const wins = logs.filter(l => l.res === 'Win').length;
            document.getElementById('winCount').textContent = wins;
            document.getElementById('lossCount').textContent = total - wins;
            document.getElementById('winRate').textContent = total ? Math.round((wins / total) * 100) + '%' : '0%';
            document.getElementById('totalPlays').textContent = total;
            document.getElementById('totalCount').textContent = total;
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const pageLogs = logs.slice(start, start + rowsPerPage);

            let html = '';
            pageLogs.forEach(log => {
                html += `
                    <tr class="border-b border-white/10">
                        <td class="px-4 py-3 mono">${log.p}</td>
                        <td class="px-4 py-3">
                            <span class="${getColorClass(log.s)}">${log.s}</span>
                            <span class="${getColorClass(log.c)} text-xs ml-1">(${log.c})</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="${getColorClass(log.actS)}">${log.actS}</span>
                            <span class="${getColorClass(log.actC)} text-xs ml-1">(${log.actC})</span>
                        </td>
                        <td class="px-4 py-3 text-right font-bold ${log.res === 'Win' ? 'text-emerald-400' : 'text-rose-400'}">
                            ${log.res}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('logItems').innerHTML = html || 
                `<tr><td colspan="4" class="text-center py-12 text-slate-500 text-xs">No records yet</td></tr>`;

            document.getElementById('pageDisplay').textContent = `${currentPage} / ${Math.ceil(logs.length / rowsPerPage) || 1}`;
            document.getElementById('lvDisplay').textContent = currentLv;
        }

        function nextPage() {
            if (currentPage * rowsPerPage < logs.length) {
                currentPage++;
                renderTable();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function clearHistory() {
            if (confirm("Clear all history?")) {
                logs = [];
                currentLv = 1;
                currentPage = 1;
                localStorage.clear();
                renderTable();
                updateStats();
            }
        }

        // Initialize
        loadState();
    </script>
</body>
</html>
