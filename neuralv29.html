<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Core v29.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d9d9;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        /* Sab kichu Ubuntu font-e hobe */
        * {
            font-family: 'Ubuntu', sans-serif !important;
            -webkit-tap-highlight-color: transparent;
        }

        /* Icons er jonno Font Awesome font-ke priority dewa holo */
        .fa, .fas, .fa-solid {
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important;
            display: inline-block !important;
            font-style: normal !important;
            font-variant: normal !important;
            text-rendering: auto !important;
            -webkit-font-smoothing: antialiased !important;
        }

        .mono { font-family: 'JetBrains Mono', monospace !important; }

        body { 
            background: #010a0a; 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            height: 100vh;
            overflow: hidden; 
        }

        .bg-animate { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #002e2e 0%, #010a0a 100%); }
        .particle { position: absolute; background: var(--primary); border-radius: 50%; opacity: 0.2; filter: blur(2px); animation: float 20s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); } 100% { transform: translateY(-10vh) scale(1.2); } }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); 
            border-radius: 0; 
            margin-bottom: 0; 
        }

        .bar-track { background: rgba(255,255,255,0.05); height: 5px; border-radius: 10px; overflow: hidden; }
        .bar-fill-gold { background: var(--gold); height: 100%; transition: width 0.8s ease; box-shadow: 0 0 10px var(--gold); }
        
        .hero-text { font-size: 2.3rem; font-weight: 700; letter-spacing: -1px; line-height: 1; }
        
        #loginScreen { position: fixed; inset: 0; z-index: 100; background: #010a0a; display: flex; align-items: center; justify-content: center; padding: 20px; }
        input { color: white !important; background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .table-container { height: 100%; overflow-y: auto; }
        
        thead th { 
            position: sticky; 
            top: 0; 
            background: rgba(1, 26, 26, 0.95); 
            backdrop-filter: blur(10px);
            z-index: 10; 
            border-bottom: 1px solid var(--glass-border); 
            padding: 12px 8px;
        }
    </style>
</head>
<body>

    <div class="bg-animate" id="bgParticles"></div>

    <div id="loginScreen">
        <div class="glass-card p-8 w-full max-w-sm text-center border-t-4 border-t-[#d4af37] rounded-3xl">
            <div class="w-16 h-16 bg-gold/10 rounded-full flex items-center justify-center border border-gold/20 mx-auto mb-4">
                <i class="fa-solid fa-shield-halved text-2xl text-gold"></i>
            </div>
            <h2 class="text-xl font-bold mb-4">Access Portal</h2>
            <div class="bg-black/40 rounded-xl p-3 mb-6 border border-white/5 text-left space-y-1">
                <div class="flex justify-between items-baseline"><span class="text-[9px] text-gray-500 font-bold uppercase">Developer:</span><span class="text-xs font-bold text-cyan-400">Vip Predict King</span></div>
                <div class="flex justify-between items-baseline"><span class="text-[9px] text-gray-500 font-bold uppercase">WhatsApp:</span><span class="text-xs font-bold text-white">+91 6290530153</span></div>
            </div>
            <div class="space-y-4">
                <input type="text" id="uid" placeholder="User ID" class="w-full p-3 rounded-xl outline-none focus:border-gold text-center">
                <input type="password" id="upass" placeholder="Password" class="w-full p-3 rounded-xl outline-none focus:border-gold text-center">
                <button onclick="handleLogin()" class="w-full bg-[#d4af37] text-black font-bold py-3 rounded-xl shadow-lg">Sign In</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="max-w-md mx-auto hidden flex flex-col h-screen">
        <div class="glass-card p-3 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-atom text-gold animate-pulse text-lg"></i>
                <div>
                    <h1 class="text-sm font-bold uppercase">Neural <span class="text-gold">v29.0</span></h1>
                    <p id="userStatus" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Lv 1 Active</p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-rose-500 bg-rose-500/10 w-10 h-10 rounded-full flex items-center justify-center border border-rose-500/20 active:scale-90 transition-all">
                <i class="fa-solid fa-power-off text-lg"></i>
            </button>
        </div>

        <div class="glass-card p-4 space-y-4 shrink-0">
            <div class="flex justify-between items-center">
                <div class="w-1/2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Period ID</span>
                    <input type="number" id="periodInput" class="bg-transparent text-2xl font-bold outline-none w-full border-b-2 border-white/5 focus:border-gold" placeholder="000" oninput="runAI()">
                </div>
                <div class="text-right">
                    <span class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Martingale</span>
                    <div id="lvDisplay" class="text-lg font-bold text-gold mono">Level 1</div>
                </div>
            </div>

            <div class="bg-black/40 rounded-2xl py-5 text-center border border-white/5 relative overflow-hidden">
                <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-black/80 z-20">
                    <i class="fa-solid fa-circle-notch fa-spin text-gold text-2xl"></i>
                </div>
                <div id="resultArea">
                    <div class="flex justify-around items-center">
                        <div><span class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Size</span><h2 id="resSize" class="hero-text">---</h2></div>
                        <div class="h-10 w-[1px] bg-white/10"></div>
                        <div><span class="text-[10px] text-slate-500 font-bold uppercase block mb-1">Color</span><h2 id="resColor" class="hero-text text-gold">---</h2></div>
                    </div>
                    <div class="mt-5 px-4 grid grid-cols-2 gap-6">
                        <div class="space-y-1"><div class="flex justify-between text-[10px] font-bold"><span class="text-slate-400">Big Prob</span><span id="bigPct" class="text-gold">0%</span></div><div class="bar-track"><div id="bigBar" class="bar-fill-gold" style="width: 0%"></div></div></div>
                        <div class="space-y-1"><div class="flex justify-between text-[10px] font-bold"><span class="text-slate-400">Small Prob</span><span id="smallPct" class="text-gold">0%</span></div><div class="bar-track"><div id="smallBar" class="bar-fill-gold" style="width: 0%"></div></div></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="record('Win')" class="py-3 rounded-xl flex items-center justify-center gap-2 bg-emerald-600 text-white font-bold active:scale-95 text-xs uppercase tracking-widest"><i class="fa-solid fa-circle-check"></i> Success</button>
                <button onclick="record('Loss')" class="py-3 rounded-xl flex items-center justify-center gap-2 bg-rose-600 text-white font-bold active:scale-95 text-xs uppercase tracking-widest"><i class="fa-solid fa-arrows-rotate"></i> Refine</button>
            </div>
        </div>

        <div class="glass-card flex-grow overflow-hidden flex flex-col">
            <div class="p-3 bg-black/40 border-b border-white/5 flex justify-between items-center shrink-0">
                <span class="text-[10px] font-bold text-gold uppercase tracking-widest">System Ledger (<span id="totalCount">0</span>)</span>
                <div class="flex gap-5 items-center">
                    <button onclick="prevPage()" class="text-gold p-2 active:scale-90"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="pageDisplay" class="text-[10px] font-bold mono bg-white/5 px-2 py-1 rounded">1 / 1</span>
                    <button onclick="nextPage()" class="text-gold p-2 active:scale-90"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="table-container no-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[9px] text-slate-500 uppercase font-bold tracking-wider">
                            <th class="px-4 py-3">Period</th>
                            <th class="px-4 py-3">Prediction</th>
                            <th class="px-4 py-3 text-center">Actual</th>
                            <th class="px-4 py-3 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logItems" class="text-[11px] font-medium"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Background particles
        const bg = document.getElementById('bgParticles');
        for(let i=0; i<15; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw'; p.style.width = p.style.height = Math.random() * 3 + 2 + 'px';
            p.style.animationDelay = Math.random() * 20 + 's'; bg.appendChild(p);
        }

        let logs = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentLv = 1;
        let active = null;

        function handleLogin() {
            if(document.getElementById('uid').value === "admin" && document.getElementById('upass').value === "1234") { 
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
            } else { alert("Wrong credentials!"); }
        }

        function runAI() {
            const p = document.getElementById('periodInput').value;
            if(!p) return;
            document.getElementById('loader').classList.remove('hidden');
            setTimeout(() => {
                const sizes = ["Big", "Small"], colors = ["Green", "Red"];
                let rS = sizes[Math.floor(Math.random()*2)], rC = colors[Math.floor(Math.random()*2)];
                let bProb = Math.floor(Math.random() * 40) + (rS === 'Big' ? 60 : 0);
                if(rS === 'Small') bProb = 100 - (Math.floor(Math.random() * 40) + 60);
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resSize').innerText = rS;
                document.getElementById('resColor').innerText = rC;
                document.getElementById('resColor').style.color = rC === 'Green' ? '#10b981' : '#f43f5e';
                document.getElementById('bigPct').innerText = bProb + '%';
                document.getElementById('bigBar').style.width = bProb + '%';
                document.getElementById('smallPct').innerText = (100-bProb) + '%';
                document.getElementById('smallBar').style.width = (100-bProb) + '%';
                active = { p, s: rS, c: rC, lv: currentLv };
            }, 500);
        }

        function record(status) {
            if(!active) return;
            const win = status === 'Win';
            const actS = win ? active.s : (active.s === 'Big' ? 'Small' : 'Big');
            const actC = win ? active.c : (active.c === 'Green' ? 'Red' : 'Green');
            logs.unshift({ ...active, actS, actC, res: status });
            if(logs.length > 200) logs.pop(); 
            currentLv = win ? 1 : (currentLv < 8 ? currentLv + 1 : 1);
            currentPage = 1; 
            renderTable();
            document.getElementById('periodInput').value = (BigInt(active.p) + 1n).toString();
            runAI();
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const paginatedItems = logs.slice(start, start + rowsPerPage);
            const totalPages = Math.ceil(logs.length / rowsPerPage) || 1;

            document.getElementById('logItems').innerHTML = paginatedItems.map(i => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-all">
                    <td class="px-4 py-4 text-slate-500 mono font-bold">${i.p}</td>
                    <td class="px-4 py-4 font-bold text-white/90">${i.s} ${i.c}</td>
                    <td class="px-4 py-4 text-center font-bold text-gold">${i.actS} ${i.actC}</td>
                    <td class="px-4 py-4 text-right font-black ${i.res === 'Win' ? 'text-emerald-500' : 'text-rose-500'}">${i.res === 'Win' ? 'WIN' : 'LOSS'}</td>
                </tr>
            `).join('');

            document.getElementById('totalCount').innerText = logs.length;
            document.getElementById('pageDisplay').innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('userStatus').innerText = `Lv ${currentLv} Active`;
            document.getElementById('lvDisplay').innerText = "Level " + currentLv;
        }

        function nextPage() { if(currentPage * rowsPerPage < logs.length) { currentPage++; renderTable(); } }
        function prevPage() { if(currentPage > 1) { currentPage--; renderTable(); } }
    </script>
</body>
</html>
