<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEURAL AI - SMART V7.0 (AUTO)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-color: #080a16;
            --card-bg: #101226;
            --border-glow: rgba(74, 144, 226, 0.2);
            --auth-gradient: linear-gradient(135deg, #4a90e2, #bd10e0);
            --primary: #4a90e2;
            --secondary: #bd10e0;
            --success: #00ff88;
            --fail: #ff4757;
            --text: #ffffff;
            --text-dim: #8a99c0;
            --yellow-glow: #ffd700;
            --blue-glow: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100dvh; width: 100vw; overflow: hidden;
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex; flex-direction: column;
        }

        .container { flex: 1; display: flex; flex-direction: column; padding: 10px; max-width: 450px; margin: 0 auto; width: 100%; gap: 8px; height: 100%; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 5px; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 2px; color: var(--primary); }
        
        .time-selector { display: flex; gap: 5px; margin-bottom: 5px; }
        .time-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glow); color: var(--text-dim); padding: 8px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; cursor: pointer; transition: 0.3s; }
        .time-btn.active { background: var(--auth-gradient); color: #fff; border-color: transparent; box-shadow: 0 0 10px rgba(74, 144, 226, 0.3); }

        .pred-card { background: var(--card-bg); border: 1px solid var(--border-glow); border-radius: 15px; padding: 12px; }
        
        #predictionBox {
            width: 100%; padding: 15px; border-radius: 12px; text-align: center;
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s;
        }
        
        .glow-red { box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); border-color: var(--fail) !important; }
        .glow-green { box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); border-color: var(--success) !important; }

        .res-text { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }
        .num-display { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; font-family: 'Orbitron', sans-serif; letter-spacing: 3px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .info-item { background: rgba(255,255,255,0.03); padding: 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .info-label { font-size: 0.5rem; color: var(--text-dim); font-family: 'Orbitron', sans-serif; display: block; margin-bottom: 2px; }
        .info-val { font-size: 0.6rem; font-weight: bold; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        .input-row { display: flex; gap: 8px; }
        input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glow); border-radius: 8px; color: #fff; padding: 12px; text-align: center; outline: none; font-family: 'Orbitron', sans-serif; }
        .btn-predict { background: var(--auth-gradient); border: none; border-radius: 8px; color: #fff; font-family: 'Orbitron', sans-serif; padding: 0 15px; font-weight: bold; cursor: pointer; }

        .log-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border-glow); border-radius: 15px; }
        .log-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-header span { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; color: var(--text-dim); }
        .btn-reset { color: var(--fail); cursor: pointer; }

        .table-container { flex: 1; overflow-y: auto; scrollbar-width: none; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 0.55rem; color: var(--text-dim); padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: var(--card-bg); font-family: 'Ubuntu', sans-serif; }
        td { padding: 10px 5px; text-align: center; font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.02); font-family: 'Ubuntu', sans-serif; }

        .clr-red { color: var(--fail); }
        .clr-green { color: var(--success); }
        .sz-big { color: var(--yellow-glow); }
        .sz-small { color: var(--blue-glow); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NEURAL AI V7.0 <span id="accuracyLabel" style="font-size: 0.5rem; color: var(--success);"></span></h1>
            <div style="color: var(--text-dim); font-size: 0.6rem; font-family: 'Orbitron';" id="clock">00:00:00</div>
        </header>

        <div class="time-selector">
            <button class="time-btn active" onclick="setTimeMode(30, this)">30S</button>
            <button class="time-btn" onclick="setTimeMode(60, this)">1M</button>
            <button class="time-btn" onclick="setTimeMode(180, this)">3M</button>
            <button class="time-btn" onclick="setTimeMode(300, this)">5M</button>
        </div>

        <section class="pred-card">
            <div id="predictionBox">
                <div id="idleText" style="font-size: 0.6rem; color: var(--text-dim); letter-spacing: 2px;">NEURAL SENSORS READY...</div>
                <div id="resDisplay" style="display:none;">
                    <div class="res-text">
                        <span id="resClr">--</span> • <span id="resSz">--</span>
                    </div>
                    <div class="num-display">PREDICTED NUMS: <span id="commonNums" style="color: #fff;">- - -</span></div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item"><span class="info-label">Smart Filter</span><span class="info-val" id="algoVal">---</span></div>
                <div class="info-item"><span class="info-label">Trend Analysis</span><span class="info-val" id="patternVal">---</span></div>
                <div class="info-item"><span class="info-label">Risk Level</span><span class="info-val" id="triggerVal">---</span></div>
                <div class="info-item"><span class="info-label">Neural Probability</span><span class="info-val" id="mathVal">---</span></div>
            </div>

            <div class="input-row">
                <input type="number" id="pInp" placeholder="Enter Last Period" inputmode="numeric">
                <button class="btn-predict" onclick="predict()">ANALYZE</button>
            </div>
        </section>

        <section class="log-section">
            <div class="log-header">
                <span>HISTORY ANALYTICS</span>
                <i class="fa-solid fa-trash-can btn-reset" onclick="clearHistory()"></i>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Period</th><th>Size</th><th>Color</th><th>Result</th><th>Status</th></tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('nai_v7_logs') || '[]');
        
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        function setTimeMode(s, btn) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function getStableNumbers(color, size, seed) {
            const redNums = [0, 2, 4, 6, 8];
            const greenNums = [1, 3, 5, 7, 9];
            let base = color === 'Red' ? redNums : greenNums;

            if (size === 'Small') {
                base = base.filter(n => n <= 4);
            } else {
                base = base.filter(n => n >= 5);
            }
            
            return base.sort(() => (seed % 7) - 3.5).slice(0, 3).join(' ');
        }

        function predict() {
            const p = document.getElementById('pInp').value;
            if(!p) return;

            const seed = parseInt(p.toString().slice(-3));
            let weight = (seed * 3 + 7) % 10;
            
            const color = weight >= 5 ? 'Green' : 'Red';
            const size = weight % 2 === 0 ? 'Small' : 'Big';

            const res = {
                period: (BigInt(p) + 1n).toString(),
                color: color,
                size: size,
                algo: "V7-Stable",
                pattern: weight > 4 ? "Linear" : "Wave",
                trigger: weight > 7 ? "High Risk" : "Low Risk",
                math: (90 + (seed % 9)) + "%",
                nums: getStableNumbers(color, size, seed),
                status: 'Pending'
            };

            history.unshift(res);
            if(history.length > 20) history.pop();
            localStorage.setItem('nai_v7_logs', JSON.stringify(history));

            updateUI(res);
            render();
            document.getElementById('pInp').value = '';
        }

        function updateUI(d) {
            document.getElementById('idleText').style.display = 'none';
            document.getElementById('resDisplay').style.display = 'block';
            const box = document.getElementById('predictionBox');
            box.className = `glow-${d.color.toLowerCase()}`;
            
            document.getElementById('resClr').innerText = d.color.toUpperCase();
            document.getElementById('resClr').className = `clr-${d.color.toLowerCase()}`;
            document.getElementById('resSz').innerText = d.size.toUpperCase();
            document.getElementById('resSz').className = d.size === 'Big' ? 'sz-big' : 'sz-small';
            document.getElementById('commonNums').innerText = d.nums;

            document.getElementById('algoVal').innerText = d.algo;
            document.getElementById('patternVal').innerText = d.pattern;
            document.getElementById('triggerVal').innerText = d.trigger;
            document.getElementById('mathVal').innerText = d.math;
            
            updateAccuracy();
        }

        function updateAccuracy() {
            let wins = history.filter(h => h.status === 'Win').length;
            let total = history.filter(h => h.status !== 'Pending').length;
            document.getElementById('accuracyLabel').innerText = `ACCURACY: ${total > 0 ? ((wins/total)*100).toFixed(0) : 0}%`;
        }

        function setStatus(idx, st) {
            // ১. স্ট্যাটাস আপডেট করা
            history[idx].status = st;
            localStorage.setItem('nai_v7_logs', JSON.stringify(history));
            render();
            updateAccuracy();
            
            // ২. অটো প্রেডিক্ট লজিক
            setTimeout(() => {
                const currentPeriod = history[idx].period;
                document.getElementById('pInp').value = currentPeriod;
                predict();
            }, 400);
        }

        function clearHistory() {
            if(confirm("Reset Neural Data?")) {
                history = [];
                localStorage.removeItem('nai_v7_logs');
                location.reload();
            }
        }

        function render() {
            const b = document.getElementById('logBody');
            b.innerHTML = '';
            history.forEach((item, index) => {
                const r = b.insertRow();
                let statusHtml = item.status === 'Pending' ? 
                    `<button style="color:var(--success);background:none;border:1px solid var(--success);padding:2px 5px;border-radius:4px;font-family:Orbitron;cursor:pointer;" onclick="setStatus(${index}, 'Win')">W</button> 
                     <button style="color:var(--fail);background:none;border:1px solid var(--fail);padding:2px 5px;border-radius:4px;font-family:Orbitron;cursor:pointer;" onclick="setStatus(${index}, 'Loss')">L</button>` : 
                    `<span style="color:var(--${item.status === 'Win' ? 'success' : 'fail'});font-family:Orbitron;">${item.status.toUpperCase()}</span>`;
                
                r.innerHTML = `
                    <td style="font-family:Orbitron;font-size:0.6rem">${item.period.slice(-3)}</td>
                    <td class="${item.size === 'Big' ? 'sz-big' : 'sz-small'}" style="font-family:Orbitron;">${item.size}</td>
                    <td class="clr-${item.color.toLowerCase()}" style="font-family:Orbitron;">${item.color}</td>
                    <td style="font-family:Orbitron;">${item.status === 'Pending' ? '--' : item.size}</td>
                    <td>${statusHtml}</td>
                `;
            });
        }
        render();
    </script>
</body>
</html>
