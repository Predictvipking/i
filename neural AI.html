<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Nexus AI Integrated V10</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0d0d0d;
            --primary: #00f0ff;
            --secondary: #7000ff;
            --success: #00ff9d;
            --danger: #ff0055;
            --warning: #ffea00;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.9);
        }
        
        .brand { font-family: 'Syncopate'; font-size: 14px; letter-spacing: 2px; color: var(--primary); }
        .timer-box { font-family: 'Syncopate'; color: var(--danger); font-size: 16px; border: 1px solid var(--danger); padding: 4px 10px; border-radius: 4px; }

        .content { flex: 1; overflow-y: auto; padding: 15px; }

        /* --- MAIN PREDICTION CARD --- */
        .pred-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .p-label { font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 5px; }
        .p-num { font-size: 18px; font-weight: 700; font-family: 'Syncopate'; margin-bottom: 20px; color: #fff; }

        .display-row {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px;
        }
        .main-size { font-size: 32px; font-weight: 700; text-transform: uppercase; }
        .main-num { font-size: 32px; font-family: 'Syncopate'; }
        .main-dot { width: 18px; height: 18px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        /* --- HISTORY TABLE (NEW DESIGN) --- */
        .history-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .h-head { 
            display: grid; grid-template-columns: 2fr 2fr 2fr 1fr; 
            padding: 12px 10px; background: #000; font-size: 9px; color: #555; font-weight: 700;
        }
        .h-list { height: 320px; overflow-y: auto; }
        .h-row { 
            display: grid; grid-template-columns: 2fr 2fr 2fr 1fr; 
            padding: 12px 10px; border-bottom: 1px solid #1a1a1a; align-items: center; font-size: 11px;
        }

        /* Status Colors */
        .win { color: var(--success); font-weight: 700; }
        .loss { color: var(--danger); font-weight: 700; }
        .dot-small { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .res-val { font-size: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">NEXUS<span style="color:var(--secondary)">AI</span> V10</div>
        <div class="timer-box" id="timer">00:00</div>
    </div>

    <div class="content">
        <div class="pred-card">
            <div class="p-label">NEXT PERIOD</div>
            <div class="p-num" id="period-display">WAITING...</div>

            <div class="display-row">
                <div class="main-size" id="pred-size">--</div>
                <div style="width:1px; height:30px; background:var(--border)"></div>
                <div class="main-num" id="pred-num">--</div>
                <div class="main-dot" id="pred-dot" style="background:#333"></div>
            </div>
            
            <div style="font-size: 10px; color: var(--primary);">AI NEURAL ALGORITHM ACTIVE</div>
        </div>

        <div class="history-card">
            <div class="h-head">
                <div>PERIOD</div>
                <div>PREDICTION</div>
                <div>RESULT</div>
                <div style="text-align:right">STATUS</div>
            </div>
            <div class="h-list" id="history-list">
                <!-- Data will appear here -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
        let state = { lastIssue: null, lastPred: null, lossStreak: 0 };

        function getInfo(n) {
            n = parseInt(n);
            const size = n > 4 ? "Big" : "Small";
            let color = "#ff0055"; // Red
            if([1,3,7,9].includes(n)) color = "#00ff9d"; // Green
            if([0,5].includes(n)) color = "#bf00ff"; // Violet
            return { size, color, n };
        }

        async function fetchGameData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const latest = data.data.list[0];
                const currentIssue = String(latest.issueNumber);

                // 1. Check Previous Result & Update History
                if (state.lastIssue && state.lastIssue !== currentIssue) {
                    const actual = getInfo(latest.number);
                    const win = state.lastPred.size === actual.size;
                    
                    if (!win) state.lossStreak++; else state.lossStreak = 0;
                    
                    updateHistoryTable(state.lastIssue, state.lastPred, actual, win);
                }

                // 2. Predict for New Period
                if (state.lastIssue !== currentIssue) {
                    state.lastIssue = currentIssue;
                    const nextPeriod = (BigInt(currentIssue) + 1n).toString();
                    document.getElementById('period-display').textContent = nextPeriod;

                    // AI logic: If loss streak >= 2, reverse prediction
                    let trend = latest.number > 4 ? "Big" : "Small";
                    if(state.lossStreak >= 2) trend = (trend === "Big") ? "Small" : "Big";

                    const pNum = trend === "Big" ? [7,8][Math.floor(Math.random()*2)] : [2,3][Math.floor(Math.random()*2)];
                    const pColor = getInfo(pNum).color;
                    
                    state.lastPred = { size: trend, num: pNum, color: pColor };

                    // Update UI
                    setTimeout(() => {
                        const sEl = document.getElementById('pred-size');
                        sEl.textContent = trend;
                        sEl.style.color = trend === "Big" ? "var(--warning)" : "var(--primary)";
                        document.getElementById('pred-num').textContent = pNum;
                        document.getElementById('pred-dot').style.background = pColor;
                        document.getElementById('pred-dot').style.color = pColor;
                    }, 1000);
                }
            } catch (e) { console.error("Sync Error"); }
        }

        function updateHistoryTable(period, pred, result, win) {
            const list = document.getElementById('history-list');
            const row = document.createElement('div');
            row.className = 'h-row';
            
            row.innerHTML = `
                <div style="color:#666; font-size:10px;">${period}</div>
                <div>
                    <span class="dot-small" style="background:${pred.color}"></span>
                    <span style="color:${pred.size === 'Big' ? 'var(--warning)' : 'var(--primary)'}">${pred.size}</span>
                    <span class="res-val">(${pred.num})</span>
                </div>
                <div>
                    <span class="dot-small" style="background:${result.color}"></span>
                    <span>${result.size}</span>
                    <span class="res-val">(${result.n})</span>
                </div>
                <div style="text-align:right;" class="${win ? 'win' : 'loss'}">${win ? 'WIN' : 'LOSS'}</div>
            `;
            list.prepend(row);
        }

        function runTimer() {
            setInterval(() => {
                const sec = new Date().getSeconds();
                const rem = 60 - sec;
                document.getElementById('timer').textContent = "00:" + (rem < 10 ? "0" + rem : rem);
                if (rem === 59) fetchGameData();
            }, 1000);
        }

        // Initialize App
        fetchGameData();
        runTimer();

    </script>
</body>
</html>
